services:
  server:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:${HOST_PORT:-8080}:8080"
    environment:
      - PORT=8080
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
