# Tron with the Wind — reverse proxy for Colyseus game servers
# Cloudflare terminates SSL (Flexible mode), nginx handles HTTP only.

upstream tron_prod {
    server 127.0.0.1:8080;
}

upstream tron_staging {
    server 127.0.0.1:8081;
}

# Map server_name to the correct upstream
map $server_name $tron_upstream {
    tron-server.afspies.com         tron_prod;
    tron-staging-server.afspies.com tron_staging;
}

server {
    listen 80;
    server_name tron-server.afspies.com tron-staging-server.afspies.com;

    location / {
        proxy_pass http://$tron_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
