services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        GIT_BRANCH: ${GIT_BRANCH:-}
    restart: unless-stopped
    expose:
      - "80"

  server:
    build: .
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      - PORT=8080
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
